name: Build and Release

# Triggers on any version tag, e.g. `git tag v1.0.0 && git push origin v1.0.0`
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}   # lets you also trigger manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Build NythosCyberAquarium.scr
        shell: pwsh
        run: |
          ./build.ps1

      - name: Verify build output
        shell: pwsh
        run: |
          if (!(Test-Path "build/NythosCyberAquarium.scr")) {
            throw "Build did not produce build/NythosCyberAquarium.scr"
          }
          Write-Host "Build artifact confirmed:"
          Get-Item "build/NythosCyberAquarium.scr" | Format-List Name, Length

      - name: Upload build artifact (for every run, even non-tag)
        uses: actions/upload-artifact@v4
        with:
          name: NythosCyberAquarium-scr
          path: build/NythosCyberAquarium.scr

      - name: Create GitHub Release with .scr attached
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/NythosCyberAquarium.scr
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
